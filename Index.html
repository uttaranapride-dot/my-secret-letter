<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>গোপন চিঠি - এডিটর</title>
    <!-- Quill.js CSS & JS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        #editor { height: 200px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">প্রিয়জনকে গোপন চিঠি লিখুন</h2>
    <div id="toolbar">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <select class="ql-size"></select>
        <select class="ql-color"></select>
    </div>
    <div id="editor"></div>
    
    <form id="letterForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="hidden" name="message" id="hiddenMessage">
        <button type="submit" onclick="prepareSubmit()">চিঠিটি পাঠিয়ে দিন</button>
    </form>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: '#toolbar' } });
    function prepareSubmit() {
        document.getElementById('hiddenMessage').value = quill.root.innerHTML;
    }
</script>

</body>
</html>
